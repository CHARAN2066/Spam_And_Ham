<!DOCTYPE html>
<html>
<head>
    <title>Spam Detector</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container{
            width:400px;
            padding:30px;
            border-radius:20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align:center;
            color:white;
        }

        h2{
            margin-bottom:20px;
        }

        textarea{
            width:100%;
            height:120px;
            border:none;
            outline:none;
            border-radius:10px;
            padding:10px;
            font-size:14px;
            resize:none;
        }

        button{
            margin-top:15px;
            padding:10px 20px;
            border:none;
            border-radius:10px;
            background:#00c6ff;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0072ff;
            transform:scale(1.05);
        }

        #result{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
        }

        .spam{
            color:#ff4d4d;
        }

        .ham{
            color:#00ffcc;
        }

    </style>
</head>

<body>

<div class="container">
    <h2>📩 Spam Detector</h2>

    <textarea id="msg" placeholder="Enter your message..."></textarea><br>

    <button onclick="check()">Check Message</button>

    <div id="result"></div>
</div>

<script>
function check() {
    let msg = document.getElementById("msg").value;

    fetch("http://localhost:3000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: msg })
    })
    .then(res => res.json())
    .then(data => {
        let resultDiv = document.getElementById("result");

        if(data.result === "Spam"){
            resultDiv.innerHTML = "🚨 Spam Message";
            resultDiv.className = "spam";
        } else {
            resultDiv.innerHTML = "✅ Safe Message";
            resultDiv.className = "ham";
        }
    });
}
</script>

</body>
</html>
